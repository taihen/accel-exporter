version: 2
builds:
  - id: accel-exporter
    main: ./cmd/accel-exporter
    binary: accel-exporter
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
nfpms:
  - id: deb
    package_name: accel-exporter
    formats: [deb]
    maintainer: taihen <taihen@taihen.org>
    description: Prometheus exporter for Accel-PPP
    homepage: https://github.com/taihen/accel-exporter
    license: MIT
    section: net
    priority: optional
    bindir: /usr/bin
    recommends:
      - accel-ppp
    contents:
      - src: deploy/accel-exporter.service
        dst: /lib/systemd/system/accel-exporter.service
    scripts:
      postinstall: deploy/postinstall.sh
      preremove: deploy/preremove.sh
dockers:
  - image_templates:
      - "ghcr.io/taihen/accel-exporter:{{ .Version }}-amd64"
    use: buildx
    goarch: amd64
    dockerfile: Dockerfile.release
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "ghcr.io/taihen/accel-exporter:{{ .Version }}-arm64"
    use: buildx
    goarch: arm64
    dockerfile: Dockerfile.release
    build_flag_templates:
      - "--platform=linux/arm64"
docker_manifests:
  - name_template: "ghcr.io/taihen/accel-exporter:{{ .Version }}"
    image_templates:
      - "ghcr.io/taihen/accel-exporter:{{ .Version }}-amd64"
      - "ghcr.io/taihen/accel-exporter:{{ .Version }}-arm64"
  - name_template: "ghcr.io/taihen/accel-exporter:latest"
    image_templates:
      - "ghcr.io/taihen/accel-exporter:{{ .Version }}-amd64"
      - "ghcr.io/taihen/accel-exporter:{{ .Version }}-arm64"
archives:
  - id: tar
    formats: [tar.gz]
checksum:
  name_template: checksums.txt
